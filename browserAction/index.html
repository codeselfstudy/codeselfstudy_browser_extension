<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="popup">
      <header class="popup-head">
        <span class="logo" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M8 3H5a2 2 0 0 0-2 2v3" />

            <path d="M16 21h3a2 2 0 0 0 2-2v-3" />
            <path d="M9 12h6" />
            <path d="M12 9v6" />
          </svg>
        </span>
        <div class="brand">
          <h1>Code Self Study</h1>
          <p>Share to the community forum</p>
        </div>
        <button
          id="openOptions"
          class="icon-btn"
          type="button"
          title="Options"
          aria-label="Open options"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </button>
      </header>
      <div class="popup-body">
        <button id="shareLink" class="btn-primary" type="button">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7" />
            <path d="M12 3v13" />
            <path d="m7 8 5-5 5 5" />
          </svg>
          Share Current Page
        </button>
        <nav class="links" aria-label="Code Self Study resources">
          <a
            class="link"
            href="https://forum.codeselfstudy.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="ico" aria-hidden="true"
              ><svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                /></svg
            ></span>
            <span class="txt"
              ><b>Coding Forum</b><span>forum.codeselfstudy.com</span></span
            >
            <span class="chev" aria-hidden="true">›</span>
          </a>
          <a
            class="link"
            href="https://www.meetup.com/codeselfstudy"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="ico" aria-hidden="true"
              ><svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" /></svg
            ></span>
            <span class="txt"
              ><b>SF Bay Meetups</b><span>meetup.com/codeselfstudy</span></span
            >
            <span class="chev" aria-hidden="true">›</span>
          </a>
          <a
            class="link"
            href="https://codeselfstudy.slack.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="ico" aria-hidden="true"
              ><svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="4" y1="9" x2="20" y2="9" />
                <line x1="4" y1="15" x2="20" y2="15" />
                <line x1="10" y1="3" x2="8" y2="21" />
                <line x1="16" y1="3" x2="14" y2="21" /></svg
            ></span>
            <span class="txt"
              ><b>Programming Chatroom</b
              ><span>codeselfstudy.slack.com</span></span
            >
            <span class="chev" aria-hidden="true">›</span>
          </a>
        </nav>
      </div>
      <footer class="popup-foot">
        <span>Code Self Study</span>
        <span id="version"></span>
      </footer>
    </div>
    <script src="../vendor/browser-polyfill.js"></script>
    <script src="script.js"></script>
  </body>
</html>
